<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استوديو التصميم - نظام الشهايد</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts (Tajawal & Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1a5c37;
            --secondary: #2c3e50;
            --bg-app: #f8fafc;
            --text-main: #1e293b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.12);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-app);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        .dashboard-wrapper {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* Sidebar Style */
        .settings-sidebar {
            width: 380px;
            background: white;
            border-left: 1px solid var(--border-color);
            padding: 1.5rem;
            overflow-y: auto;
            box-shadow: 4px 0 15px rgba(0,0,0,0.02);
            z-index: 10;
        }

        /* Workspace Style */
        .workspace-area {
            flex: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            background: #f1f5f9;
            overflow: hidden;
        }

        .preview-container-wrapper {
            flex: 1;
            background: white;
            border-radius: 1.5rem;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            position: relative;
        }

        /* Draggable Elements */
        .draggable-text-premium {
            position: absolute;
            cursor: move;
            padding: 5px 10px;
            border: 2px dashed transparent;
            user-select: none;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .draggable-text-premium:hover {
            border-color: var(--primary);
            background: rgba(26, 92, 55, 0.05);
        }

        .drag-handle {
            background: var(--primary);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            margin-left: 10px;
            opacity: 0;
            transition: 0.3s;
        }

        .draggable-text-premium:hover .drag-handle {
            opacity: 1;
        }

        .fit-image {
            max-width: 100%;
            max-height: 75vh;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .btn-premium {
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-premium-primary {
            background: var(--primary);
            color: white;
            border: none;
        }

        .btn-premium-primary:hover {
            background: #14462a;
            transform: translateY(-2px);
        }

        .accordion-button:not(.collapsed) {
            background-color: rgba(26, 92, 55, 0.05);
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="dashboard-wrapper">
    <!-- Sidebar -->
    <aside class="settings-sidebar">
        <div class="mb-4">
            <h4 class="fw-bold text-main">استوديو التصميم</h4>
            <p class="text-muted small">نسخة الويب (Static Version)</p>
        </div>

        <div class="accordion" id="settingsAccordion">
            <!-- 1. Media -->
            <div class="accordion-item border-0 mb-3 shadow-sm rounded-4 overflow-hidden">
                <h2 class="accordion-header">
                    <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseFiles">
                        <i class="fa-solid fa-image me-2"></i> 1. قالب الشهادة
                    </button>
                </h2>
                <div id="collapseFiles" class="accordion-collapse collapse show">
                    <div class="accordion-body">
                        <div class="p-4 border-2 border-dashed rounded-4 text-center" onclick="document.getElementById('TemplateFile').click()" style="cursor: pointer; border-color: #cbd5e1;">
                            <i class="fa-solid fa-cloud-arrow-up fs-2 text-muted mb-2"></i>
                            <p class="small mb-0">انقر لرفع صورة القالب</p>
                            <input type="file" id="TemplateFile" class="d-none" accept="image/*" onchange="previewImage(event)">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2. Text Layers -->
            <div class="accordion-item border-0 mb-3 shadow-sm rounded-4 overflow-hidden">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseText">
                        <i class="fa-solid fa-font me-2"></i> 2. النصوص
                    </button>
                </h2>
                <div id="collapseText" class="accordion-collapse collapse">
                    <div class="accordion-body">
                        <div class="mb-3">
                            <label class="small fw-bold mb-1">اسم المتدرب</label>
                            <input type="text" class="form-control form-control-sm" value="محمد عبدالله" oninput="updateText('previewName', this.value)">
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold mb-1">حجم الخط</label>
                            <input type="range" class="form-range" min="10" max="100" value="48" oninput="updateStyle('previewName', 'fontSize', this.value + 'px')">
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold mb-1">لون الخط</label>
                            <input type="color" class="form-control form-control-color w-100" value="#000000" oninput="updateStyle('previewName', 'color', this.value)">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button class="btn btn-premium btn-premium-primary w-100 py-3 mt-4" onclick="downloadCertificate()">
            <i class="fa-solid fa-download me-2"></i> تحميل الشهادة (PNG)
        </button>
        <p class="text-center text-muted small mt-2">ملاحظة: هذه النسخة تعمل بالكامل في المتصفح.</p>
    </aside>

    <!-- Workspace -->
    <main class="workspace-area">
        <div class="preview-container-wrapper" id="captureArea">
            <div id="noImageOverlay" class="text-center p-5">
                <i class="fa-solid fa-wand-magic-sparkles text-muted opacity-25 mb-3" style="font-size: 60px;"></i>
                <h5 class="fw-bold">ارفع القالب للبدء</h5>
            </div>

            <div id="imageContainer" style="position: relative; display: none;">
                <img id="imagePreview" src="#" class="fit-image rounded-2">
                
                <div id="previewName" class="draggable-text-premium" style="top: 50%; left: 50%; font-size: 48px; font-weight: bold;">
                    <span class="drag-handle"><i class="fa-solid fa-arrows-up-down-left-right"></i></span>
                    <div class="text-content">اسم المتدرب</div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- html2canvas for downloading -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function() {
            document.getElementById('imagePreview').src = reader.result;
            document.getElementById('imageContainer').style.display = 'block';
            document.getElementById('noImageOverlay').style.display = 'none';
        }
        if (event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
    }

    function updateText(id, val) {
        document.getElementById(id).querySelector('.text-content').innerText = val || "(فارغ)";
    }

    function updateStyle(id, prop, val) {
        document.getElementById(id).style[prop] = val;
    }

    // Drag and Drop Logic
    let activeEl = null;
    let isDragging = false;
    let startX, startY, initialLeft, initialTop;

    document.querySelectorAll('.draggable-text-premium').forEach(item => {
        item.addEventListener('mousedown', function(e) {
            isDragging = true;
            activeEl = item;
            startX = e.clientX;
            startY = e.clientY;
            initialLeft = activeEl.offsetLeft;
            initialTop = activeEl.offsetTop;
            e.preventDefault();
        });
    });

    document.addEventListener('mousemove', function(e) {
        if (!isDragging || !activeEl) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        activeEl.style.left = (initialLeft + dx) + 'px';
        activeEl.style.top = (initialTop + dy) + 'px';
    });

    document.addEventListener('mouseup', () => { isDragging = false; activeEl = null; });

    // Download functionality using html2canvas
    function downloadCertificate() {
        const area = document.getElementById('imageContainer');
        if (area.style.display === 'none') {
            alert("يرجى رفع قالب أولاً");
            return;
        }
        
        // Hide handles during capture
        document.querySelectorAll('.drag-handle').forEach(h => h.style.display = 'none');
        
        html2canvas(area).then(canvas => {
            const link = document.createElement('a');
            link.download = 'certificate.png';
            link.href = canvas.toDataURL();
            link.click();
            document.querySelectorAll('.drag-handle').forEach(h => h.style.display = 'flex');
        });
    }
</script>

</body>
</html>
